name: Release

on:
  push:
    tags: ['v*']
  workflow_dispatch:

jobs:
  build:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            args: '--target aarch64-apple-darwin'
          - platform: macos-latest
            args: '--target x86_64-apple-darwin'
          - platform: ubuntu-22.04
            args: ''
          - platform: windows-latest
            args: ''

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          # Build host arch by default; the macOS matrix also asks for the
          # opposite arch via --target, which tauri-action installs on demand.
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: Cache cargo
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install Linux deps
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            libgtk-3-dev \
            libssl-dev

      - run: npm ci

      - name: Build & release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: 'config-editor ${{ github.ref_name }}'
          releaseBody: |
            ## What's new

            See the commits on this tag for details. The packaged binaries below are for testing — the editor expects a GitHub PAT (paste-once on first launch) to load and push config repos.

            **Downloads**
            - macOS Apple Silicon: `*.dmg` (aarch64)
            - macOS Intel: `*.dmg` (x86_64)
            - Linux: `*.AppImage` and `*.deb`
            - Windows: `*.msi` and `*.exe`

            ## ⚠️ macOS — "the app is damaged" / "l'app è danneggiata"

            The build is **ad-hoc signed but not notarized** (we don't have an Apple Developer certificate yet), so on first launch macOS will refuse to open the app with a misleading *"is damaged and can't be opened"* message. It's not damaged — Gatekeeper just doesn't trust un-notarized apps. Strip the quarantine flag once after install:

            ```sh
            xattr -cr "/Applications/GestaltBI Config Editor.app"
            ```

            Then double-click normally. The flag is only set on first download; subsequent launches work without further action.

            On macOS 15 (Sequoia) the right-click → Open bypass is gone, so the `xattr` command above is the cleanest path. Alternatively, after the first failed launch open *System Settings → Privacy & Security* and click **Open Anyway** at the bottom.
          releaseDraft: false
          prerelease: false
          args: ${{ matrix.args }}
